services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zipscope-postgis
    environment:
      POSTGRES_USER: zipscope
      POSTGRES_PASSWORD: zipscope
      POSTGRES_DB: zipscope
    ports:
      - "5432:5432"
    volumes:
      - zipscope_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zipscope -d zipscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zipscope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zipscope-backend
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://zipscope:zipscope@postgres:5432/zipscope
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  zipscope_postgres_data:
